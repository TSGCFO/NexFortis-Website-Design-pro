<!DOCTYPE html>
<html lang="en-CA">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!--
      Per-page SEO tags (title, description, canonical, hreflang, robots, OG/Twitter,
      JSON-LD) are injected by react-helmet-async at runtime from `src/components/seo.tsx`,
      and baked into static HTML by the Vite build's pre-render step
      (vite-plugin-prerender, see `vite.config.ts`). The shell intentionally omits
      these tags so each pre-rendered page ships exactly one canonical/title/etc.
      Crawlers fetching the SPA shell directly (the unrendered `dist/public/index.html`
      that serves all unknown routes) will see only the noscript fallback below.
    -->

    <meta name="theme-color" content="#003566" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preload" href="/fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/alegreya-sans-sc-700-latin.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Google Analytics 4 (GA4) is loaded at runtime by src/lib/analytics.ts
         after the visitor accepts the cookie consent banner. The measurement
         ID is provided via the VITE_GA_MEASUREMENT_ID environment variable. -->
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="font-family: system-ui, sans-serif; max-width: 720px; margin: 4rem auto; padding: 0 1.5rem; line-height: 1.6; color: #0d1b2a;">
        <h1 style="font-size: 1.75rem; margin-bottom: 1rem;">NexFortis IT Solutions</h1>
        <p>NexFortis IT Solutions provides managed IT, Microsoft 365, QuickBooks migration, digital marketing, and workflow automation for Canadian businesses.</p>
        <p>This site requires JavaScript for the full interactive experience. Please enable JavaScript, or browse our <a href="https://nexfortis.com/sitemap.xml">site map</a> for a list of pages.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
