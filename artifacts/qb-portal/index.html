<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Per-page SEO tags (title, description, canonical, OG/Twitter, JSON-LD)
      are injected by react-helmet-async at runtime from `src/components/seo.tsx`,
      and baked into static HTML by the Vite build's pre-render step
      (vite-plugin-prerender, see `vite.config.ts`). The shell intentionally omits
      these tags so each pre-rendered page ships exactly one canonical/title/etc.
    -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preload" href="/fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/inter-600.woff2" as="font" type="font/woff2" crossorigin>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="font-family: system-ui, sans-serif; max-width: 720px; margin: 4rem auto; padding: 0 1.5rem; line-height: 1.6; color: #0d1b2a;">
        <h1 style="font-size: 1.75rem; margin-bottom: 1rem;">NexFortis QuickBooks Portal</h1>
        <p>NexFortis provides QuickBooks conversion and data services for Canadian businesses — Enterprise to Premier conversion, audit trail removal, super condense, file repair, and more.</p>
        <p>This site requires JavaScript for the full interactive experience. Please enable JavaScript, or browse our <a href="https://qb.nexfortis.com/sitemap.xml">site map</a> for a list of pages.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
