services:
  - type: web
    name: nexfortis-api
    runtime: node
    plan: standard
    region: oregon
    rootDir: .
    branch: main
    autoDeploy: true
    buildCommand: |
      corepack enable
      NODE_ENV=development pnpm install --frozen-lockfile --prod=false
      pnpm run typecheck:libs
      pnpm --filter @workspace/api-server... build
    startCommand: NODE_ENV=production node artifacts/api-server/dist/index.cjs
    healthCheckPath: /api/healthz
    envVars:
      # NODE_ENV intentionally omitted from service env (set on the start command instead).
      # Setting NODE_ENV=production here causes pnpm install to skip devDependencies
      # (tsx, esbuild, typescript) and breaks the build.
      - key: NODE_VERSION
        value: "24"
      - key: LOG_LEVEL
        value: info
      - key: PORT
        value: "10000"
      - key: PUBLIC_APP_URL
        value: https://nexfortis.com
      - key: PORTAL_URL
        value: https://qb.nexfortis.com
      - key: API_BASE_URL
        value: https://nexfortis-api.onrender.com/api
      - key: EMAIL_FROM
        value: NexFortis Support <noreply@nexfortis.com>
      - key: LAUNCH_PROMO_ACTIVE
        value: "true"
      # Stripe price + coupon IDs (not secrets — public-ish identifiers tied to the
      # Stripe account; committing them avoids 8 manual dashboard steps per deploy.
      # If you swap Stripe accounts later, update these here and redeploy.)
      - key: STRIPE_PRICE_ESSENTIALS
        value: price_1TNekyIlg3BstMSENIFao5KS
      - key: STRIPE_PRICE_ESSENTIALS_PROMO
        value: price_1TNekyIlg3BstMSEKjpAmaAm
      - key: STRIPE_PRICE_PROFESSIONAL
        value: price_1TNekyIlg3BstMSEfBd4Fmnp
      - key: STRIPE_PRICE_PROFESSIONAL_PROMO
        value: price_1TNekxIlg3BstMSErqwJUX4g
      - key: STRIPE_PRICE_PREMIUM
        value: price_1TNekxIlg3BstMSExpkCxSn2
      - key: STRIPE_PRICE_PREMIUM_PROMO
        value: price_1TNekxIlg3BstMSETNpfy5w9
      - key: STRIPE_COUPON_PRO_10
        value: 0qjilCpv
      - key: STRIPE_COUPON_PREMIUM_20
        value: K3rbghiR
      # Secrets — set via Render dashboard, do NOT commit values
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: BLOG_ADMIN_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: OPERATOR_EMAIL
        sync: false
      - key: OPERATOR_PASSWORD
        sync: false

  - type: web
    name: nexfortis-marketing
    runtime: static
    rootDir: .
    branch: main
    autoDeploy: true
    buildCommand: |
      corepack enable
      NODE_ENV=development pnpm install --frozen-lockfile --prod=false
      pnpm run typecheck:libs
      PORT=3000 BASE_PATH=/ pnpm --filter @workspace/nexfortis... --stream build
    staticPublishPath: artifacts/nexfortis/dist/public
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_VERSION
        value: "24"
      # Frontend build-time vars (must be present at `vite build` for inlining).
      - key: VITE_GA_MEASUREMENT_ID
        sync: false
      # NOTE: VITE_API_BASE_URL is intentionally NOT set. The frontend uses
      # relative `/api/...` paths that go through the same-origin /api/* rewrite
      # below, which avoids CORS entirely. The API server's CORS allow-list only
      # permits the production custom domains; setting this env var would make
      # the bundle call the API cross-origin and every request would be blocked.
    headers:
      # Hashed asset bundles — immutable, cache for a year. Vite emits unique
      # filenames per build (e.g. /assets/index-abc123.js) so a cached old
      # version is never served for a new build. This more-specific path
      # rule overrides the broader /* Cache-Control below for asset URLs.
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      # HTML pages and everything else — cache 24h at the Cloudflare edge
      # (s-maxage), but force browsers to re-validate every request
      # (max-age=0). The 5-minute Render default of s-maxage=300 caused
      # cache misses on every SEObility crawl from Germany, inflating their
      # measured TTFB from ~150-200ms (cached edge) to 500-750ms (origin
      # fetch). 24h s-maxage keeps low-traffic landing/service pages warm
      # at the edge between crawls. stale-while-revalidate=86400 lets the
      # edge serve a slightly-stale page (up to 48h old total) instantly
      # while refreshing in the background.
      #
      # On deploy, Render automatically purges its CDN cache so new HTML
      # is served immediately. Manual Cloudflare cache purge is also
      # available from the dashboard for hot-fixes.
      - path: /*
        name: Cache-Control
        value: public, max-age=0, s-maxage=86400, stale-while-revalidate=86400
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains; preload
    routes:
      - type: redirect
        source: /services/automation-software
        destination: /services/workflow-automation
      # Reverse-proxy /api/* to the API service. Render uses `*` (not Netlify's
      # `:splat`) for the wildcard substitution in the destination URL.
      - type: rewrite
        source: /api/*
        destination: https://nexfortis-api.onrender.com/api/*
      # SPA-only routes (NOT prerendered — no .html mirror exists). These must
      # come BEFORE the .html catch-all below so they fall back to index.html
      # and let the React SPA handle the route.
      - type: rewrite
        source: /admin
        destination: /spa-shell.html
      - type: rewrite
        source: /admin/*
        destination: /spa-shell.html
      - type: rewrite
        source: /blog/admin
        destination: /spa-shell.html
      # Pretty URLs: serve the prerendered .html mirror for clean URLs without
      # trailing slash. Render does NOT auto-strip .html, so /about must be
      # explicitly rewritten to /about.html (which prerender.mjs writes
      # alongside the dist/about/index.html directory index).
      # - Real files (sitemap.xml, robots.txt, /assets/*) are served directly,
      #   before rewrites apply.
      # - Trailing-slash variants like /about/ are served from
      #   dist/about/index.html via Render's directory-index handling.
      - type: rewrite
        source: /*
        destination: /*.html

  - type: web
    name: nexfortis-qb-portal
    runtime: static
    rootDir: .
    branch: main
    autoDeploy: true
    buildCommand: |
      corepack enable
      NODE_ENV=development pnpm install --frozen-lockfile --prod=false
      pnpm run typecheck:libs
      PORT=3000 BASE_PATH=/ pnpm --filter @workspace/qb-portal... build
    staticPublishPath: artifacts/qb-portal/dist/public
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_VERSION
        value: "24"
      # Frontend build-time vars — Vite inlines these into the bundle at build time,
      # so they MUST be set on the static site (not on the API service) and the site
      # must be re-deployed if they change. Without these, AuthProvider throws on load.
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      # Shared GA4 Measurement ID — same value as the marketing site so both
      # hosts report into one property with cross-domain tracking. Analytics
      # only fire after the visitor accepts the cookie consent banner.
      - key: VITE_GA_MEASUREMENT_ID
        sync: false
      # NOTE: VITE_API_BASE_URL is intentionally NOT set. See the marketing
      # site block above for the rationale (same-origin /api/* rewrite avoids
      # CORS; setting this env var would break every API call on the temporary
      # *.onrender.com URLs because they're not in the API's CORS allow-list).
    headers:
      # Hashed asset bundles — immutable, cache for a year. Vite emits unique
      # filenames per build (e.g. /assets/index-abc123.js) so a cached old
      # version is never served for a new build. This more-specific path
      # rule overrides the broader /* Cache-Control below for asset URLs.
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      # HTML pages and everything else — cache 24h at the Cloudflare edge
      # but force browsers to re-validate every request. See marketing
      # service above for full rationale (SEObility cache-miss issue).
      #
      # IMPORTANT: SPA-shell routes (/login, /portal, /admin, /order/:id,
      # /ticket/:id, /auth/*) are rewritten to /spa-shell.html. The shell
      # is a generic noindex SPA bootloader that serves identical content
      # to every authenticated path, so caching it for 24h is safe — the
      # actual auth-gated UI is rendered client-side from the React app
      # after hydration, which fetches fresh data from the API.
      - path: /*
        name: Cache-Control
        value: public, max-age=0, s-maxage=86400, stale-while-revalidate=86400
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains; preload
    routes:
      # 301 redirects: retired duplicate expert-support product pages.
      # These were one-time-order mirrors of the monthly subscription plans,
      # which caused customers to pay once for a service that only makes
      # sense as a recurring subscription. The canonical home is /subscription.
      # Redirects MUST come before rewrites so they match first.
      - type: redirect
        source: /service/expert-support-essentials
        destination: /subscription
      - type: redirect
        source: /service/expert-support-professional
        destination: /subscription
      - type: redirect
        source: /service/expert-support-premium
        destination: /subscription
      - type: redirect
        source: /category/expert-support
        destination: /subscription
      # Reverse-proxy /api/* to the API service. Render uses `*` (not Netlify's
      # `:splat`) for the wildcard substitution in the destination URL.
      - type: rewrite
        source: /api/*
        destination: https://nexfortis-api.onrender.com/api/*
      # SPA-only routes (NOT prerendered — no .html mirror exists). These must
      # come BEFORE the .html catch-all below. Includes the auth flow, the
      # checkout / order pages (which need a live session), the customer
      # portal, the admin area, and dynamic per-record routes (ticket/<id>,
      # order/<id>) that aren't enumerated at build time.
      - type: rewrite
        source: /login
        destination: /spa-shell.html
      - type: rewrite
        source: /register
        destination: /spa-shell.html
      - type: rewrite
        source: /forgot-password
        destination: /spa-shell.html
      - type: rewrite
        source: /reset-password
        destination: /spa-shell.html
      - type: rewrite
        source: /auth/*
        destination: /spa-shell.html
      - type: rewrite
        source: /order
        destination: /spa-shell.html
      - type: rewrite
        source: /order/*
        destination: /spa-shell.html
      - type: rewrite
        source: /portal
        destination: /spa-shell.html
      - type: rewrite
        source: /portal/*
        destination: /spa-shell.html
      - type: rewrite
        source: /admin
        destination: /spa-shell.html
      - type: rewrite
        source: /admin/*
        destination: /spa-shell.html
      - type: rewrite
        source: /ticket/*
        destination: /spa-shell.html
      # Pretty URLs: serve the prerendered .html mirror for clean URLs without
      # trailing slash. See the marketing site block above for the rationale
      # and behavior of real files / directory indexes.
      - type: rewrite
        source: /*
        destination: /*.html
